<html lang="en">
  <head>

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Prevent white flash -->
    <style>
      body {
        margin: 0;
        background: #0f172a; /* match your theme */
      }
      #loader {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        letter-spacing: 1px;
      }
    </style>
  </head>
