server {
    listen 80;
    server_name kebiinternationalacademy.com www.kebiinternationalacademy.com;

    # Pass real visitor IP from Cloudflare
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Proxy API requests to Django backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare Flexible: origin receives HTTP but browser used HTTPS
        # Hardcode https so Django's SECURE_SSL_REDIRECT does not fire
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy media files to backend
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Serve React frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
