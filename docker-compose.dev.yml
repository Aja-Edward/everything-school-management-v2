services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"  # Use 5435 externally to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:  
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/school_db
      ENV: dev
      DEBUG: "True"
      SECRET_KEY: your-secret-key-change-this  
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: school_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      CLOUDINARY_CLOUD_NAME: difk8fefd
      CLOUDINARY_API_KEY: "881742393918975"
      CLOUDINARY_API_SECRET: qWX974_yCGa8ebk6RdqBH68EfjA

    ports:
      - "8084:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    depends_on:
      - backend
    environment:
      # For browser API calls (client-side)
      VITE_API_URL: http://localhost:8084/api
      # For Vite proxy (server-side) - use Docker service name
      VITE_BACKEND_URL: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres_data: